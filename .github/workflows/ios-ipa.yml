name: iOS IPA Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-ipa:
    runs-on: macos-14
    timeout-minutes: 60
    env:
      BUNDLE_ID: xyz.appinstall.nov.carbon.lam
      EXT_BUNDLE_ID: xyz.appinstall.nov.carbon.lam.PacketTunnel
      IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
      IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
      IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
      IOS_MOBILEPROVISION_BASE64_APP: ${{ secrets.IOS_MOBILEPROVISION_BASE64_APP }}
      IOS_MOBILEPROVISION_BASE64_EXT: ${{ secrets.IOS_MOBILEPROVISION_BASE64_EXT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build IPA (signed if cert secrets exist)
        run: |
          APP_PROFILE_B64="$IOS_MOBILEPROVISION_BASE64_APP"
          if [ -z "$APP_PROFILE_B64" ]; then APP_PROFILE_B64="$IOS_MOBILEPROVISION_BASE64"; fi
          EXT_PROFILE_B64="$IOS_MOBILEPROVISION_BASE64_EXT"
          if [ -z "$EXT_PROFILE_B64" ]; then EXT_PROFILE_B64="$APP_PROFILE_B64"; fi
          if [ -n "$IOS_P12_BASE64" ] && [ -n "$IOS_P12_PASSWORD" ] && [ -n "$APP_PROFILE_B64" ]; then
            CERT_PATH=$RUNNER_TEMP/cert.p12
            APP_PROFILE_PATH=$RUNNER_TEMP/profile_app.mobileprovision
            EXT_PROFILE_PATH=$RUNNER_TEMP/profile_ext.mobileprovision
            KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
            IOS_P12_PASSWORD_CLEAN=$(printf %s "$IOS_P12_PASSWORD" | tr -d '\r\n')
            echo -n "$IOS_P12_BASE64" | base64 --decode -o "$CERT_PATH"
            echo -n "$APP_PROFILE_B64" | base64 --decode -o "$APP_PROFILE_PATH"
            echo -n "$EXT_PROFILE_B64" | base64 --decode -o "$EXT_PROFILE_PATH"
            security create-keychain -p "" "$KEYCHAIN_PATH"
            security set-keychain-settings "$KEYCHAIN_PATH"
            security unlock-keychain -p "" "$KEYCHAIN_PATH"
            if ! security import "$CERT_PATH" -P "$IOS_P12_PASSWORD_CLEAN" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"; then
              openssl pkcs12 -in "$CERT_PATH" -passin "pass:$IOS_P12_PASSWORD_CLEAN" -clcerts -nokeys -out "$RUNNER_TEMP/cert.pem"
              openssl pkcs12 -in "$CERT_PATH" -passin "pass:$IOS_P12_PASSWORD_CLEAN" -nocerts -nodes -out "$RUNNER_TEMP/key.pem"
              security import "$RUNNER_TEMP/cert.pem" -A -k "$KEYCHAIN_PATH"
              security import "$RUNNER_TEMP/key.pem" -A -k "$KEYCHAIN_PATH"
            fi
            security list-keychains -d user -s "$KEYCHAIN_PATH"
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            security cms -D -i "$APP_PROFILE_PATH" > "$RUNNER_TEMP/profile_app.plist"
            security cms -D -i "$EXT_PROFILE_PATH" > "$RUNNER_TEMP/profile_ext.plist"
            APP_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$RUNNER_TEMP/profile_app.plist")
            APP_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$RUNNER_TEMP/profile_app.plist")
            EXT_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$RUNNER_TEMP/profile_ext.plist")
            EXT_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$RUNNER_TEMP/profile_ext.plist")
            cp "$APP_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$APP_PROFILE_UUID.mobileprovision"
            cp "$EXT_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$EXT_PROFILE_UUID.mobileprovision"
            TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$RUNNER_TEMP/profile_app.plist")
            GET_TASK_ALLOW=$(/usr/libexec/PlistBuddy -c "Print Entitlements:get-task-allow" "$RUNNER_TEMP/profile_app.plist")
            APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$RUNNER_TEMP/profile_app.plist")
            APP_GROUPS=$(/usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.security.application-groups:0" "$RUNNER_TEMP/profile_app.plist" 2>/dev/null || true)
            APP_NETEXT=$(/usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.developer.networking.networkextension:0" "$RUNNER_TEMP/profile_app.plist" 2>/dev/null || true)
            EXT_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$RUNNER_TEMP/profile_ext.plist")
            EXT_GROUPS=$(/usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.security.application-groups:0" "$RUNNER_TEMP/profile_ext.plist" 2>/dev/null || true)
            EXT_NETEXT=$(/usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.developer.networking.networkextension:0" "$RUNNER_TEMP/profile_ext.plist" 2>/dev/null || true)
            PROFILE_BUNDLE_ID=${APP_IDENTIFIER#${TEAM_ID}.}
            PROFILE_EXT_BUNDLE_ID=${EXT_IDENTIFIER#${TEAM_ID}.}
            if [ -n "$PROFILE_BUNDLE_ID" ] && [ "$PROFILE_BUNDLE_ID" != "*" ]; then BUNDLE_ID="$PROFILE_BUNDLE_ID"; fi
            if [ -n "$PROFILE_EXT_BUNDLE_ID" ] && [ "$PROFILE_EXT_BUNDLE_ID" != "*" ]; then EXT_BUNDLE_ID="$PROFILE_EXT_BUNDLE_ID"; fi
            if [ -z "$APP_NETEXT" ] || [ -z "$APP_GROUPS" ] || [ -z "$EXT_NETEXT" ] || [ -z "$EXT_GROUPS" ]; then
              echo "Provisioning profile missing required entitlements (NetworkExtension/AppGroup)."
              exit 1
            fi
            HAS_PROVISIONED_DEVICES="false"
            if /usr/libexec/PlistBuddy -c "Print ProvisionedDevices:0" "$RUNNER_TEMP/profile_app.plist" >/dev/null 2>&1; then
              HAS_PROVISIONED_DEVICES="true"
            fi
            PROVISIONS_ALL_DEVICES=$(/usr/libexec/PlistBuddy -c "Print ProvisionsAllDevices" "$RUNNER_TEMP/profile_app.plist" 2>/dev/null || echo "false")
            EXPORT_METHOD="app-store"
            if [ "$GET_TASK_ALLOW" = "true" ]; then
              EXPORT_METHOD="development"
            elif [ "$PROVISIONS_ALL_DEVICES" = "true" ]; then
              EXPORT_METHOD="enterprise"
            elif [ "$HAS_PROVISIONED_DEVICES" = "true" ]; then
              EXPORT_METHOD="release-testing"
            fi
            EXPORT_PLIST="$RUNNER_TEMP/ExportOptions.plist"
            /usr/libexec/PlistBuddy -c "Add :method string $EXPORT_METHOD" "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :teamID string $TEAM_ID" "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$BUNDLE_ID string $APP_PROFILE_NAME" "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$EXT_BUNDLE_ID string $EXT_PROFILE_NAME" "$EXPORT_PLIST"
            pushd ios
            xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release \
              -archivePath "$PWD/build/Runner.xcarchive" archive \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"
            xcodebuild -exportArchive \
              -archivePath "$PWD/build/Runner.xcarchive" \
              -exportOptionsPlist "$EXPORT_PLIST" \
              -exportPath "$PWD/../build/ios/ipa"
            popd
          else
            flutter build ios --release --no-codesign
            mkdir -p build/ios/ipa/Payload
            cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
            cd build/ios/ipa
            /usr/bin/zip -r app-unsigned.ipa Payload
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: |
            build/ios/ipa/*.ipa
          if-no-files-found: error
