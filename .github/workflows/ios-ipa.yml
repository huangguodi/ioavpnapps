name: iOS IPA Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-ipa:
    runs-on: macos-14
    timeout-minutes: 60
    env:
      BUNDLE_ID: xyz.appinstall.nov.carbon.lam
      IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
      IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
      IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build IPA (signed if cert secrets exist)
        run: |
          if [ -n "$IOS_P12_BASE64" ] && [ -n "$IOS_P12_PASSWORD" ] && [ -n "$IOS_MOBILEPROVISION_BASE64" ]; then
            CERT_PATH=$RUNNER_TEMP/cert.p12
            PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
            KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
            IOS_P12_PASSWORD_CLEAN=$(printf %s "$IOS_P12_PASSWORD" | tr -d '\r\n')
            echo -n "$IOS_P12_BASE64" | base64 --decode -o "$CERT_PATH"
            echo -n "$IOS_MOBILEPROVISION_BASE64" | base64 --decode -o "$PROFILE_PATH"
            security create-keychain -p "" "$KEYCHAIN_PATH"
            security set-keychain-settings "$KEYCHAIN_PATH"
            security unlock-keychain -p "" "$KEYCHAIN_PATH"
            if ! security import "$CERT_PATH" -P "$IOS_P12_PASSWORD_CLEAN" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"; then
              openssl pkcs12 -in "$CERT_PATH" -passin "pass:$IOS_P12_PASSWORD_CLEAN" -clcerts -nokeys -out "$RUNNER_TEMP/cert.pem"
              openssl pkcs12 -in "$CERT_PATH" -passin "pass:$IOS_P12_PASSWORD_CLEAN" -nocerts -nodes -out "$RUNNER_TEMP/key.pem"
              security import "$RUNNER_TEMP/cert.pem" -A -k "$KEYCHAIN_PATH"
              security import "$RUNNER_TEMP/key.pem" -A -k "$KEYCHAIN_PATH"
            fi
            security list-keychains -d user -s "$KEYCHAIN_PATH"
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
            PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$RUNNER_TEMP/profile.plist")
            cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
            TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$RUNNER_TEMP/profile.plist")
            GET_TASK_ALLOW=$(/usr/libexec/PlistBuddy -c "Print Entitlements:get-task-allow" "$RUNNER_TEMP/profile.plist")
            APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$RUNNER_TEMP/profile.plist")
            PROFILE_BUNDLE_ID=${APP_IDENTIFIER#${TEAM_ID}.}
            if [ -n "$PROFILE_BUNDLE_ID" ] && [ "$PROFILE_BUNDLE_ID" != "*" ]; then
              BUNDLE_ID="$PROFILE_BUNDLE_ID"
            fi
            EXPORT_METHOD="ad-hoc"
            if [ "$GET_TASK_ALLOW" = "true" ]; then EXPORT_METHOD="development"; fi
            EXPORT_PLIST="$RUNNER_TEMP/ExportOptions.plist"
            /usr/libexec/PlistBuddy -c "Add :method string $EXPORT_METHOD" "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :teamID string $TEAM_ID" "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$BUNDLE_ID string $PROFILE_UUID" "$EXPORT_PLIST"
            if [ "$EXPORT_METHOD" = "development" ]; then
              IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\(Apple Development[^"]*\)".*/\1/p' | head -n 1)
            else
              IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\(Apple Distribution[^"]*\)".*/\1/p' | head -n 1)
              if [ -z "$IDENTITY" ]; then
                IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\(iPhone Distribution[^"]*\)".*/\1/p' | head -n 1)
              fi
            fi
            if [ -z "$IDENTITY" ]; then
              echo "No matching signing identity found in keychain for method=$EXPORT_METHOD"
              security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
              exit 1
            fi
            flutter build ios --release --no-codesign
            pushd ios
            xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release \
              -archivePath "$PWD/build/Runner.xcarchive" archive \
              CODE_SIGN_STYLE=Manual \
              DEVELOPMENT_TEAM="$TEAM_ID" \
              PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
              PROVISIONING_PROFILE="$PROFILE_UUID" \
              PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
              CODE_SIGN_IDENTITY="$IDENTITY" \
              OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"
            xcodebuild -exportArchive \
              -archivePath "$PWD/build/Runner.xcarchive" \
              -exportOptionsPlist "$EXPORT_PLIST" \
              -exportPath "$PWD/../build/ios/ipa"
            popd
          else
            flutter build ios --release --no-codesign
            mkdir -p build/ios/ipa/Payload
            cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
            cd build/ios/ipa
            /usr/bin/zip -r app-unsigned.ipa Payload
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: |
            build/ios/ipa/*.ipa
          if-no-files-found: error
