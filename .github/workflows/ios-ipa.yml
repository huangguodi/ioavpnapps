name: iOS IPA Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-ipa:
    runs-on: macos-14
    timeout-minutes: 60
    env:
      MAIN_BUNDLE_ID: com.xiangyu.clash
      EXTENSION_BUNDLE_ID: com.xiangyu.clash.packettunnel
      IOS_P12_FILE: ios_cert/dev.p12
      IOS_MAIN_MOBILEPROVISION_FILE: ios_cert/Clash_Main_Profile.mobileprovision
      IOS_EXTENSION_MOBILEPROVISION_FILE: ios_cert/Clash_Extension_Profile.mobileprovision
      IOS_P12_PASSWORD: "112233"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build IPA (signed from repository cert files)
        run: |
          set -eo pipefail
          if [ ! -f "$IOS_P12_FILE" ]; then
            echo "Missing certificate file: $IOS_P12_FILE"
            exit 1
          fi
          if [ ! -f "$IOS_MAIN_MOBILEPROVISION_FILE" ]; then
            echo "Missing main provisioning file: $IOS_MAIN_MOBILEPROVISION_FILE"
            exit 1
          fi
          if [ ! -f "$IOS_EXTENSION_MOBILEPROVISION_FILE" ]; then
            echo "Missing extension provisioning file: $IOS_EXTENSION_MOBILEPROVISION_FILE"
            exit 1
          fi
          CERT_PATH=$RUNNER_TEMP/cert.p12
          MAIN_PROFILE_PATH=$RUNNER_TEMP/main.mobileprovision
          EXTENSION_PROFILE_PATH=$RUNNER_TEMP/extension.mobileprovision
          MAIN_PROFILE_PLIST=$RUNNER_TEMP/main_profile.plist
          EXTENSION_PROFILE_PLIST=$RUNNER_TEMP/extension_profile.plist
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          IOS_P12_PASSWORD_CLEAN=$(printf %s "$IOS_P12_PASSWORD" | tr -d '\r\n')
          cp "$IOS_P12_FILE" "$CERT_PATH"
          cp "$IOS_MAIN_MOBILEPROVISION_FILE" "$MAIN_PROFILE_PATH"
          cp "$IOS_EXTENSION_MOBILEPROVISION_FILE" "$EXTENSION_PROFILE_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          if ! security import "$CERT_PATH" -P "$IOS_P12_PASSWORD_CLEAN" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"; then
            openssl pkcs12 -in "$CERT_PATH" -passin "pass:$IOS_P12_PASSWORD_CLEAN" -clcerts -nokeys -out "$RUNNER_TEMP/cert.pem"
            openssl pkcs12 -in "$CERT_PATH" -passin "pass:$IOS_P12_PASSWORD_CLEAN" -nocerts -nodes -out "$RUNNER_TEMP/key.pem"
            security import "$RUNNER_TEMP/cert.pem" -A -k "$KEYCHAIN_PATH"
            security import "$RUNNER_TEMP/key.pem" -A -k "$KEYCHAIN_PATH"
          fi
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          security cms -D -i "$MAIN_PROFILE_PATH" > "$MAIN_PROFILE_PLIST"
          security cms -D -i "$EXTENSION_PROFILE_PATH" > "$EXTENSION_PROFILE_PLIST"
          MAIN_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$MAIN_PROFILE_PLIST")
          MAIN_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$MAIN_PROFILE_PLIST")
          EXTENSION_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$EXTENSION_PROFILE_PLIST")
          EXTENSION_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$EXTENSION_PROFILE_PLIST")
          cp "$MAIN_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$MAIN_PROFILE_UUID.mobileprovision"
          cp "$EXTENSION_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$EXTENSION_PROFILE_UUID.mobileprovision"
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$MAIN_PROFILE_PLIST")
          EXTENSION_TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$EXTENSION_PROFILE_PLIST")
          if [ "$TEAM_ID" != "$EXTENSION_TEAM_ID" ]; then
            echo "Provisioning profiles belong to different teams"
            exit 1
          fi
          MAIN_APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$MAIN_PROFILE_PLIST")
          EXTENSION_APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$EXTENSION_PROFILE_PLIST")
          PROFILE_MAIN_BUNDLE_ID=${MAIN_APP_IDENTIFIER#${TEAM_ID}.}
          PROFILE_EXTENSION_BUNDLE_ID=${EXTENSION_APP_IDENTIFIER#${TEAM_ID}.}
          if [ -n "$PROFILE_MAIN_BUNDLE_ID" ] && [ "$PROFILE_MAIN_BUNDLE_ID" != "*" ]; then
            MAIN_BUNDLE_ID="$PROFILE_MAIN_BUNDLE_ID"
          fi
          if [ -n "$PROFILE_EXTENSION_BUNDLE_ID" ] && [ "$PROFILE_EXTENSION_BUNDLE_ID" != "*" ]; then
            EXTENSION_BUNDLE_ID="$PROFILE_EXTENSION_BUNDLE_ID"
          fi
          GET_TASK_ALLOW=$(/usr/libexec/PlistBuddy -c "Print Entitlements:get-task-allow" "$MAIN_PROFILE_PLIST")
          HAS_PROVISIONED_DEVICES="false"
          if /usr/libexec/PlistBuddy -c "Print ProvisionedDevices:0" "$MAIN_PROFILE_PLIST" >/dev/null 2>&1; then
            HAS_PROVISIONED_DEVICES="true"
          fi
          PROVISIONS_ALL_DEVICES=$(/usr/libexec/PlistBuddy -c "Print ProvisionsAllDevices" "$MAIN_PROFILE_PLIST" 2>/dev/null || echo "false")
          EXPORT_METHOD="app-store"
          if [ "$GET_TASK_ALLOW" = "true" ]; then
            EXPORT_METHOD="development"
          elif [ "$PROVISIONS_ALL_DEVICES" = "true" ]; then
            EXPORT_METHOD="enterprise"
          elif [ "$HAS_PROVISIONED_DEVICES" = "true" ]; then
            EXPORT_METHOD="ad-hoc"
          fi
          EXPORT_PLIST="$RUNNER_TEMP/ExportOptions.plist"
          /usr/libexec/PlistBuddy -c "Add :method string $EXPORT_METHOD" "$EXPORT_PLIST"
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" "$EXPORT_PLIST"
          /usr/libexec/PlistBuddy -c "Add :teamID string $TEAM_ID" "$EXPORT_PLIST"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" "$EXPORT_PLIST"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$MAIN_BUNDLE_ID string $MAIN_PROFILE_NAME" "$EXPORT_PLIST"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$EXTENSION_BUNDLE_ID string $EXTENSION_PROFILE_NAME" "$EXPORT_PLIST"
          pushd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/Runner.xcarchive" archive \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/Runner.xcarchive" \
            -exportOptionsPlist "$EXPORT_PLIST" \
            -exportPath "$PWD/../build/ios/ipa"
          popd

      - name: Upload IPA to tmpfiles.org
        run: |
          set -eo pipefail
          IPA_FILE=$(find build/ios/ipa -maxdepth 1 -name '*.ipa' | head -n 1)
          if [ -z "$IPA_FILE" ]; then
            echo "No IPA file found in build/ios/ipa"
            exit 1
          fi
          UPLOAD_RESPONSE=$(curl -fsS --retry 3 --retry-all-errors -F "file=@${IPA_FILE}" https://tmpfiles.org/api/v1/upload)
          IPA_URL=$(python -c "import json,sys; data=json.loads(sys.argv[1]); print(data.get('data', {}).get('url', ''))" "$UPLOAD_RESPONSE")
          if [ -z "$IPA_URL" ]; then
            echo "Upload to tmpfiles.org failed"
            echo "$UPLOAD_RESPONSE"
            exit 1
          fi
          echo "IPA_URL=$IPA_URL" >> "$GITHUB_ENV"
          echo "IPA download URL: $IPA_URL"
          {
            echo "## IPA 下载地址"
            echo
            echo "$IPA_URL"
          } >> "$GITHUB_STEP_SUMMARY"
