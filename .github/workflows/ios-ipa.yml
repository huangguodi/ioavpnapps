name: iOS IPA Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-ipa:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build unsigned app when signing secrets are missing
        if: ${{ secrets.IOS_P12_BASE64 == '' || secrets.IOS_P12_PASSWORD == '' || secrets.IOS_MOBILEPROVISION_BASE64 == '' || secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 == '' }}
        run: |
          flutter build ios --release --no-codesign
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          /usr/bin/zip -r app-unsigned.ipa Payload

      - name: Import certificates and provisioning profile
        if: ${{ secrets.IOS_P12_BASE64 != '' && secrets.IOS_P12_PASSWORD != '' && secrets.IOS_MOBILEPROVISION_BASE64 != '' && secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 != '' }}
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
          IOS_EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          EXPORT_OPTIONS_PATH=$RUNNER_TEMP/ExportOptions.plist
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo -n "$IOS_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$IOS_MOBILEPROVISION_BASE64" | base64 --decode -o "$PROFILE_PATH"
          echo -n "$IOS_EXPORT_OPTIONS_PLIST_BASE64" | base64 --decode -o "$EXPORT_OPTIONS_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/
          flutter build ipa --release --export-options-plist="$EXPORT_OPTIONS_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: |
            build/ios/ipa/*.ipa
          if-no-files-found: error
